name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  # ---------------------------------------------------------------------------
  # Backend
  # ---------------------------------------------------------------------------

  backend:
    name: Backend · Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      ENVIRONMENT: development
      DATABASE_URL: sqlite:///./ci.db
      SECRET_KEY: ci-secret-key-for-migrations-only-32chars
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      BOOTSTRAP_ADMIN_USERNAME: ciadmin
      BOOTSTRAP_ADMIN_PASSWORD: cipassword

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run backend tests with coverage
        run: pytest --cov=app --cov-report=term-missing -q

  backend-quality:
    name: Backend · Code quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run ruff check
        run: ruff check app tests

      - name: Run ruff format check
        run: ruff format --check app tests

      - name: Run mypy
        run: mypy app

  # ---------------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------------

  frontend:
    name: Frontend · Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run unit tests
        working-directory: frontend
        run: npm run test -- --run

  # ---------------------------------------------------------------------------
  # Quality gate (all checks must pass before smoke)
  # ---------------------------------------------------------------------------

  quality:
    name: Quality gate · Ready for merge
    runs-on: ubuntu-latest
    needs:
      - backend
      - backend-quality
      - frontend

    steps:
      - name: READY FOR MERGE
        run: |
          echo "All required checks passed:"
          echo "  - Backend · Tests"
          echo "  - Backend · Code quality"
          echo "  - Frontend · Unit tests"
          echo ""
          echo "READY FOR MERGE"
          echo "::notice title=READY FOR MERGE::Backend tests, backend quality checks, and frontend unit tests all passed."

  # ---------------------------------------------------------------------------
  # Smoke
  # ---------------------------------------------------------------------------

  smoke:
    name: Smoke · E2E
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install backend dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install -r requirements-dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests
        working-directory: frontend
        env:
          CI: "1"
        run: npm run test:smoke
